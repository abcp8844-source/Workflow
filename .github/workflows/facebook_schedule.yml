name: Facebook Auto Poster

on:
  schedule:
    - cron: '0 */3 * * *'  # ہر 3 گھنٹے بعد چلے گا
  workflow_dispatch:      # مینوئل چلانے کا بٹن

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Facebook Poster
        env:
          FACEBOOK_PAGE_ACCESS_TOKEN: ${{ secrets.FACEBOOK_PAGE_ACCESS_TOKEN }}
        run: python facebook_poster.py

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add pending_posts.json
          git diff --quiet && git diff --staged --quiet || (git commit -m "Cleaned up published post from pending list" && git push)
