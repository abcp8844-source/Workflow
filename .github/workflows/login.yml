name: Initial Facebook Login

on:
  workflow_dispatch:

jobs:
  login:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # یہ لائن فائل کو ریپو میں سیو کرنے کے لیے ضروری ہے
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install playwright
          playwright install chromium
          sudo apt-get install -y xvfb

      - name: Run Login Script
        env:
          FB_EMAIL: ${{ secrets.FB_EMAIL }}
          FB_PASSWORD: ${{ secrets.FB_PASSWORD }}
        run: xvfb-run python login_and_save.py

      - name: Save Session to Repository
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add auth_state.json
          git commit -m "Update session state [skip ci]" || echo "No changes to commit"
          git push
