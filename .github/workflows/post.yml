name: Facebook Auto Post

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:

jobs:
  post:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: pip install requests

      - name: Run Posting Script
        env:
          ACCESS_TOKEN: ${{ secrets.ACCESS_TOKEN }}
        run: python post_to_page.py

      - name: Commit updated list
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add pending_posts.json
          git diff-index --quiet HEAD || git commit -m "Update post list"
          git push
